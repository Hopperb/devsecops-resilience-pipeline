name: DevSecOps Automated Security Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    name: Execute Pipeline Audits
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code onto the GitHub runner
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Crucial for GitLeaks to scan commit history

    # Step 2: Set up Node.js environment for dependency scanning
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './vulnerable-api/package-lock.json'

    # Step 3: Install dependencies
    - name: Install Project Dependencies
      run: |
        cd vulnerable-api
        npm ci

    # Step 4: Run GitLeaks natively via their official GitHub Action
    - name: Run GitLeaks (Secret Scanner)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Step 5: Run Semgrep natively via their official GitHub Action
    - name: Run Semgrep (SAST Engine)
      uses: semgrep/semgrep-action@v1
      with:
        config: auto

    # Step 6: Run NPM Audit for Supply Chain check
    - name: Run Dependency Audit (SCA)
      run: |
        cd vulnerable-api
        npm audit --audit-level=high
