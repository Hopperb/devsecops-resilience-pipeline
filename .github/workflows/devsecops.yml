name: DevSecOps Automated Security Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    name: Execute Pipeline Audits
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code onto the GitHub runner
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    # Step 2: Set up Node.js environment (Updated to Node 24 and fixed cache path)
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: './package-lock.json'

    # Step 3: Install dependencies (No need to cd, we are already in the root)
    - name: Install Project Dependencies
      run: npm ci

    # Step 4: Run GitLeaks natively via their official GitHub Action
    - name: Run GitLeaks (Secret Scanner)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Step 5: Run Semgrep natively via their official GitHub Action
    - name: Run Semgrep (SAST Engine)
      uses: semgrep/semgrep-action@v1
      with:
        config: auto

    # Step 6: Run NPM Audit for Supply Chain check (No need to cd)
    - name: Run Dependency Audit (SCA)
      run: npm audit --audit-level=high
